# Brokerage Model Monthly Signal Generator
# Runs on the last week of each month only (single-day execution).
# The script self-checks whether today is the last trading day.

name: Brokerage Model Monthly Signals

env:
  # Opt into Node.js 24 to silence deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run at 9:30 PM ET (01:30 UTC next day) on the last 5 days of each month.
    # The Python script will exit early if today is not the last trading day.
    # No first-of-month run — taxable account uses single-day execution
    # per IPS v2.1 Section 4.2 (no tranching).
    - cron: '30 1 27-31 * *'
  
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if not a scheduled trading day'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# Required for the commit-back step to push stoken_state.json
permissions:
  contents: write

jobs:
  compute-signals:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run signal computation
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TAA_EMAIL_TO: ${{ secrets.TAA_EMAIL_TO }}
          TAA_EMAIL_FROM: ${{ secrets.TAA_EMAIL_FROM }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python run_monthly.py --force
          else
            python run_monthly.py
          fi
      
      - name: Commit Stoken state
        run: |
          # stoken_state.json tracks which modules are in risk vs defensive
          # position — needed for the hold-between-channels logic.
          if [ -f stoken_state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add stoken_state.json
            git diff --cached --quiet || git commit -m "Update Stoken channel state [automated]"
            git push
          fi
