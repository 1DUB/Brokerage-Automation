# Brokerage Model Monthly Signal Generator
# Runs on the last week of each month and first day of each month.
# The script self-checks whether today is an actual trading day.

name: Brokerage Model Monthly Signals

env:
  # Opt into Node.js 24 to silence deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  - name: Run signal computation
  env:
    RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    TAA_EMAIL_TO: ${{ secrets.TAA_EMAIL_TO }}
    TAA_EMAIL_FROM: ${{ secrets.TAA_EMAIL_FROM }}
    FRED_API_KEY: ${{ secrets.FRED_API_KEY }}     # ← ADD THIS LINE
  run: |
    if [ "${{ github.event.inputs.force }}" = "true" ]; then
      python run_monthly.py --force
    else
      python run_monthly.py
    fi

on:
  schedule:
    # Run at 9:30 PM ET (01:30 UTC next day) on the last 5 days of each month
    # and the first 2 days of each month.
    - cron: '30 1 27-31 * *'  # Last few days of month (Tranche 1 candidate)
    - cron: '30 1 1-2 * *'    # First few days of month (Tranche 2 candidate)
  
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if not a scheduled trading day'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  compute-signals:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run signal computation
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TAA_EMAIL_TO: ${{ secrets.TAA_EMAIL_TO }}
          TAA_EMAIL_FROM: ${{ secrets.TAA_EMAIL_FROM }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python run_monthly.py --force
          else
            python run_monthly.py
          fi
